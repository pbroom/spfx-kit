name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, guard, and security tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # Vite 8/rolldown ships per-platform optional native bindings. A
        # macOS-authored lockfile can leave Linux runners without the
        # matching linux-{x64,arm64}-gnu packages after plain `npm ci`
        # (npm/cli#4828). The lab package pins both arches as optional
        # deps; re-resolve them for the runner OS without mutating the
        # lockfile.
        run: npm ci && npm install --include=optional --no-save

      - name: Build workspaces
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Public repo guard
        run: npm run guard:public

      - name: Security regression tests
        timeout-minutes: 5
        run: npm run test:security

      - name: Build supported SPFx canary package
        run: npm run ship:canary

      - name: Verify SPFx package artifact
        run: npm run verify:sppkg -- --app examples/hello-card-spfx

      - name: Upload SPFx canary package
        uses: actions/upload-artifact@v4
        with:
          name: hello-card-sppkg
          path: examples/hello-card-spfx/sharepoint/solution/hello-card.sppkg
          if-no-files-found: error
