name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Forbid @spfx-kit dependencies
        run: |
          node -e "
            const pkg = require('./package.json');
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            const bad = Object.keys(deps).filter((name) => name.startsWith('@spfx-kit/'));
            if (bad.length) {
              console.error('Production SPFx apps must not depend on @spfx-kit packages: ' + bad.join(', '));
              process.exit(1);
            }
          "

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx gulp build

      - name: Bundle (ship)
        run: npx gulp bundle --ship

      - name: Package solution (ship)
        run: npx gulp package-solution --ship

      - name: Upload SharePoint package
        uses: actions/upload-artifact@v4
        with:
          name: sppkg
          path: sharepoint/solution/*.sppkg
          if-no-files-found: error

  release:
    name: Attach .sppkg to release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ship build
        run: |
          npx gulp clean
          npx gulp bundle --ship
          npx gulp package-solution --ship

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            sharepoint/solution/*.sppkg
